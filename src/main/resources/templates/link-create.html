<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TobyShortUrl - Create Link</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 48px auto; padding: 0 16px; }
        h2 { margin-bottom: 24px; color: #111; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; }
        input[type="url"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        input:focus { outline: none; border-color: #4285F4; box-shadow: 0 0 0 3px rgba(66,133,244,0.15); }
        .btn-submit { background: #4285F4; color: white; padding: 12px 32px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { background: #3367D6; }
        .back-link { display: inline-block; margin-top: 16px; color: #4285F4; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create New Link</h2>
        <div class="card">
            <form th:action="@{/app/links}" method="post">
                <label for="url">URL</label>
                <input type="url" id="url" name="url" placeholder="https://example.com" required>
                <label for="title">Title (optional)</label>
                <input type="text" id="title" name="title" placeholder="My Link">
                <button class="btn-submit" type="submit">Create Link</button>
            </form>
        </div>
        <a class="back-link" th:href="@{/app/dashboard}">&larr; Back to Dashboard</a>
    </div>
</body>
</html>
