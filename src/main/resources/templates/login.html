<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TobyShortUrl - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 48px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 32px; margin-bottom: 8px; color: #111; }
        p { color: #666; margin-bottom: 32px; }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 12px; color: white; }
        .btn-google { background: #4285F4; }
        .btn-google:hover { background: #3367D6; }
        .btn-github { background: #24292e; }
        .btn-github:hover { background: #1b1f23; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>TobyShortUrl</h1>
        <p>Sign in to manage your short links</p>
        <a class="btn btn-google" href="/oauth2/authorization/google">Sign in with Google</a>
        <a class="btn btn-github" href="/oauth2/authorization/github">Sign in with GitHub</a>
    </div>
</body>
</html>
