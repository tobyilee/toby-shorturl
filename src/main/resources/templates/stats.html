<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TobyShortUrl - Statistics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 800px; margin: 48px auto; padding: 0 16px; }
        h2 { margin-bottom: 8px; color: #111; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .stat-cards { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex: 1; text-align: center; }
        .stat-number { font-size: 36px; font-weight: 700; color: #4285F4; }
        .stat-label { font-size: 14px; color: #666; margin-top: 4px; }
        .back-link { display: inline-block; color: #4285F4; text-decoration: none; margin-top: 24px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2 th:text="${link.title ?: link.shortCode}">Link Title</h2>
        <div class="subtitle" th:text="${shortUrl}">http://localhost:8090/abc123</div>

        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-number" th:text="${stats.totalClicks()}">0</div>
                <div class="stat-label">Total Clicks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${stats.uniqueClicks()}">0</div>
                <div class="stat-label">Unique Clicks</div>
            </div>
        </div>

        <p>Active Preset: <span th:text="${activePreset}">30d</span></p>
        <p>Clicks by date data: <span th:text="${stats.clicksByDate()}">[]</span></p>

        <a class="back-link" th:href="@{/app/links/{id}(id=${link.id})}">&larr; Back to Link Detail</a>
    </div>
</body>
</html>
