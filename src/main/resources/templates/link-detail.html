<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TobyShortUrl - Link Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 48px auto; padding: 0 16px; }
        h2 { margin-bottom: 24px; color: #111; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .field { margin-bottom: 20px; }
        .field-label { font-weight: 600; color: #555; font-size: 14px; margin-bottom: 4px; }
        .field-value { font-size: 16px; color: #111; word-break: break-all; }
        .field-value a { color: #4285F4; text-decoration: none; }
        .field-value a:hover { text-decoration: underline; }
        .stat-box { display: inline-block; background: #f0f7ff; padding: 16px 32px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 700; color: #4285F4; }
        .stat-label { font-size: 14px; color: #666; }
        .qr-section { text-align: center; margin-top: 24px; }
        .qr-section img { border: 1px solid #eee; border-radius: 8px; }
        .back-link { display: inline-block; color: #4285F4; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .copy-row { display: flex; align-items: center; gap: 8px; }
        .copy-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; gap: 4px; color: #666; }
        .copy-btn:hover { background: #f0f0f0; }
        .copy-btn svg { width: 18px; height: 18px; }
        .copied-text { font-size: 13px; color: #34a853; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h2 th:text="${link.title ?: link.shortCode}">Link Title</h2>
        <div class="card">
            <div class="field">
                <div class="field-label">Original URL</div>
                <div class="field-value"><a th:href="${link.originalUrl}" th:text="${link.originalUrl}" target="_blank">https://example.com</a></div>
            </div>
            <div class="field">
                <div class="field-label">Short URL</div>
                <div class="field-value">
                    <div class="copy-row">
                        <a th:href="${shortUrl}" th:text="${shortUrl}" target="_blank">http://localhost:8080/abc123</a>
                        <button class="copy-btn" id="copyBtn" th:data-url="${shortUrl}" onclick="copyShortUrl(this)">
                            <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            <span class="copied-text" id="copiedText" style="display:none;">Copied!</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="field">
                <div class="stat-box">
                    <div class="stat-number" th:text="${link.clickCount}">0</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
            </div>
            <div class="qr-section">
                <img th:src="@{/api/links/{id}/qr(id=${link.id})}" alt="QR Code" width="200" height="200">
            </div>
        </div>
        <a class="back-link" th:href="@{/app/dashboard}">&larr; Back to Dashboard</a>
    </div>
    <script>
    function copyShortUrl(btn) {
        var url = btn.getAttribute('data-url');
        navigator.clipboard.writeText(url).then(function() {
            var icon = btn.querySelector('#copyIcon');
            var text = btn.querySelector('#copiedText');
            icon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
            icon.style.color = '#34a853';
            text.style.display = 'inline';
            setTimeout(function() {
                icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
                icon.style.color = '';
                text.style.display = 'none';
            }, 2000);
        });
    }
    </script>
</body>
</html>
